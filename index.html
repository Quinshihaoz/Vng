<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Acc Play Together & Roblox</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        
        .card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; padding-bottom: 15px; }
        .card img { width: 100%; height: auto; border-bottom: 2px solid #eee; }
        
        .card h3 { color: #ff8c00; font-size: 18px; margin: 15px 5px; text-transform: uppercase; }
        .card p { margin: 5px 0; color: #555; font-weight: bold; }
        
        .btn-view { display: inline-block; background: linear-gradient(to right, #ff4e50, #f9d423); color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; margin-top: 10px; }
        .btn-view:hover { opacity: 0.9; }
    </style>
</head>
<body>

<h2 style="text-align:center;">DANH MỤC GAME</h2>
<div class="container">
    <div class="card">
        <img src="https://via.placeholder.com/300x180" alt="Roblox">
        <h3>ACC ROBLOX BLOX FRUIT</h3>
        <p>Đã bán: 12,450</p>
        <p>Còn lại: 150</p>
        <a href="#" class="btn-view">XEM TẤT CẢ</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x180" alt="Play Together">
        <h3>NICK CÓ NHIỀU TIỀN SAO</h3>
        <p>Đã bán: 8,718</p>
        <p>Còn lại: 1,903</p>
        <a href="#" class="btn-view">XEM TẤT CẢ</a>
    </div>
</div>

</body>
</html>
